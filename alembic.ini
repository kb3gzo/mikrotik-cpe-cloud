# Alembic configuration. Runtime DB URL is injected from app.config (so we
# don't duplicate the DSN between .env and alembic.ini) — see alembic/env.py.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is intentionally left blank — env.py pulls it from settings
sqlalchemy.url =

[post_write_hooks]
# e.g. hooks = ruff ; ruff.type = console_scripts ; ruff.entrypoint = ruff

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
